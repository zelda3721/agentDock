# 合规门禁（开发计划 §11.2「许可证 CI，W1 起 PR 级门禁」/ §10 / 红线 10/14/21/22/23）。
#
# 设计要点：本 workflow **不需要 ohpm / hvigor / DevEco**——它只跑纯 Node 静态检查，
# 因此在 GitHub 免费 runner 上即可稳定通过（真机构建见 build.yml 的说明）。
# 零第三方依赖：不执行 npm install，脚本全部是本机 Node 22 直跑的 ESM。

name: compliance

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

# 最小权限：只读仓库内容
permissions:
  contents: read

concurrency:
  group: compliance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-and-redlines:
    name: 许可与红线门禁
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # 无 lockfile、无依赖，故不配置 cache

      - name: 环境自检
        run: node --version

      # 红线 22 / §22.4：全源文件 SPDX 头
      - name: SPDX 许可头检查
        run: node tools/license/check-spdx.mjs

      # 红线 21 / §11.2：依赖树许可审计（白名单外即 fail）
      - name: 依赖许可审计
        run: node tools/license/check-deps.mjs

      # 红线 10（R1 MuPDF）/ 14（R5 权重）/ 23（签名材料）
      - name: R1/R5 防复发门禁
        run: node tools/license/check-forbidden.mjs

      # 红线 14 / §11.3：模型清单（含「sha256 为 null 必须标 pending-verification」）
      - name: 模型清单校验
        run: node tools/models/validate-manifest.mjs

  ui-gate:
    name: UI 设计门禁（UI 设计规范 §2.9）
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1/4 —— [R-04] 改任何一个 hex 必须跑通对比度全表；hex 从 color.json 实读现算，不抄规范里的数字
      - name: 对比度全表断言
        run: node tools/ui/check-contrast.mjs

      # 2/4 —— §2.8.2 零 hex 字面量 · [R-24] 零裸字号 · [R-03a] 实心前景不得是 Color.White
      #        · 两套 color.json name 集合一致 · 品牌轴与语义轴不得混用（[R-32]）
      - name: 令牌纪律
        run: node tools/ui/check-tokens.mjs

      # 3/4 —— [R-100] 形状冗余必须由 SVG 提供：emoji presentation 会渲染成彩色，无视 currentColor，
      #        而「warning 恒带 △」是 warning 与 remote 不混淆的唯一保障——载体不可控，冗余就不成立
      - name: 形状冗余（禁 emoji / 系统字形）
        run: node tools/ui/check-glyphs.mjs

      # 4/4 —— §5 文案纪律：术语表、动词一致、单位空格、[R-41] 无宾语确认
      - name: 文案纪律
        run: node tools/ui/check-copy.mjs

      # §22.4 应用内许可展示防漂移：rawfile 产物必须与 THIRD_PARTY_LICENSES/ 一致
      - name: 许可展示产物核对
        run: node tools/license/gen-rawfile.mjs --check

  compression-regression:
    name: 压缩回归 V0.9 最小子集（红线 27）
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 红线 27：压缩逻辑改动没有回归套件不许合并（无豁免期）。
      # 套件转译并直接运行 common/core-agent 下的真实 .ets 源码（FidelityGate/ContextGovernor/
      # ChatCompactor/ChatPromptBuilder…），三项机械核对：溯源指针可寻回 / 实体机械核对 / 植入约束召回。
      # 全仓 PR 恒跑（套件秒级，不做路径过滤——过滤条件本身也会腐烂）。
      - name: 压缩回归（跑真实源码）
        run: node tools/eval/compression-regression/run-regression.mjs

      # §10：core 层单元测试全覆盖 AgentRun 状态机（T0.9-16）。
      # 同一方法论：转译直跑 runtime/AgentRun.ets 与 RunGate.ets——迁移表/裁决器改动即时反映。
      - name: AgentRun 状态机 + RunGate 回归（跑真实源码）
        run: node tools/eval/agent-run/run-tests.mjs

      # T0.9-13 余项：docx XML 抽取（纯函数）回归——跨 run 拼接/实体解码/表格整块
      - name: docx 抽取回归（跑真实源码）
        run: node tools/eval/docx-parse/run-tests.mjs

      # T0.9-22 / §12-M2：RAG 金标集 30 组，recall@6 ≥85% 为 V0.9 发布门禁。
      # 同一方法论：转译直跑 Parser/Chunker/Tokenize/Retriever 真实源码 + Schema 真 DDL，
      # node:sqlite 建 FTS5 影子表；KbRepo.searchFts 的 SQL 逐字镜像并在 runner 里核对防漂移。
      # 全仓 PR 恒跑（秒级；分词/切块/检索口径任一改坏即时报警）。
      - name: RAG 金标集 recall@6（跑真实源码）
        run: node tools/eval/rag-gold/run-gold.mjs
